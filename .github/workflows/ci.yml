name: CI

on:
  push:
    branches-ignore: []
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    name: Vet + Test + Build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Vet
        run: go vet ./pkg/... .

      - name: Test
        run: go test ./pkg/...

      - name: Build (linux desktop)
        run: go build -tags "desktop,production" -o /tmp/nc1-launcher .
