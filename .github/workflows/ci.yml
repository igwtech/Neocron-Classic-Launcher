name: CI

on:
  push:
    branches-ignore: []
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    name: Vet + Test + Build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Vet
        run: go vet ./pkg/... .

      - name: Test
        run: go test ./pkg/...

      - name: Build (linux desktop)
        # webkit2_41 selects WebKit2GTK 4.1 (what ubuntu-latest ships); without it
        # Wails' cgo pkg-config looks for the older webkit2gtk-4.0.
        run: go build -tags "desktop,production,webkit2_41" -o /tmp/nc1-launcher .
