<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neocron Launcher</title>
    <!-- Local Bootstrap (shipped in wwwroot) so the launcher works offline. -->
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
</head>

<body>
    <div id="filecheck" class="container-fluid h-100" style="display: none;"></div>
    <div id="launcher" class="container-fluid">
        <!-- Header -->
        <div class="row fixed-top header-row">
            <div class="col-9">
                <img src="img/ncc-logo.svg" class="header-logo" />
            </div>
            <div class="col-3 header-links">
                <a class="header-link" href="https://discord.gg/neocron" target="_blank">DISCORD</a>
                <span class="header-link-sep">-</span>
                <a class="header-link" href="https://www.neocron.org" target="_blank">WEBSITE</a>
                <span class="header-link-sep">-</span>
                <a class="header-link" href="https://ncpd.neocron.org" target="_blank">ACCOUNT MGR</a>
                <a class="header-link header-gear" id="options-link" title="Options" aria-label="Options">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true">
                        <path d="M19.14 12.94a7.49 7.49 0 0 0 .05-.94 7.49 7.49 0 0 0-.05-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.61-.22l-2.39.96a7 7 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54a7 7 0 0 0-1.62.94l-2.39-.96a.5.5 0 0 0-.61.22L2.74 8.84a.5.5 0 0 0 .12.64l2.03 1.58a7.49 7.49 0 0 0 0 1.88l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .61.22l2.39-.96a7 7 0 0 0 1.62.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54a7 7 0 0 0 1.62-.94l2.39.96a.5.5 0 0 0 .61-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/>
                    </svg>
                </a>
            </div>
        </div>

        <!-- Banners (populated by jQuery neocron.js) -->
        <div id="boxes" class="banners-row"></div>

        <!-- News (populated by launcher.js) -->
        <div id="news-section" class="news-row"></div>

        <!-- Play and Progress Footer -->
        <div class="row progress-play fixed-bottom">
            <div class="col-3">
                <div id="auth-area" class="auth-area"></div>
                <select id="channel-select" class="channel-select">
                    <option value="ncc-pts">Neocron Public Test</option>
                    <option value="ncc-retail" disabled>Neocron Retail</option>
                </select>
                <div id="play-group" class="btn-group"></div>
            </div>
            <div id="progress-col" class="col-9 progress-col"></div>
        </div>

        <!-- Version -->
        <div class="version-label" id="version-label">v0.0.0</div>
    </div>

    <!-- Options dialog (toggled by the header gear icon) -->
    <div id="options-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title">Launcher Options</span>
                <span class="modal-close" id="options-close" title="Close">&times;</span>
            </div>
            <div class="modal-section-label">When the game launches</div>
            <label class="option-row">
                <input type="radio" name="postLaunch" value="close" />
                <span>Close the launcher</span>
            </label>
            <label class="option-row">
                <input type="radio" name="postLaunch" value="taskbar" />
                <span>Keep the launcher open</span>
            </label>
            <label class="option-row" id="option-tray-row">
                <input type="radio" name="postLaunch" value="tray" />
                <span>Minimize to the system tray</span>
            </label>
        </div>
    </div>

    <!-- Game-running guard: shown when an update can't be applied because
         neocron.exe is still running. -->
    <div id="game-running-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <div class="modal-header">
                <span class="modal-title">Can't Update While Playing</span>
            </div>
            <div class="modal-body">
                Neocron is still running. The launcher can't update the game while it's open.
                Close all copies of Neocron to continue, or abort the update.
            </div>
            <div class="modal-actions">
                <button type="button" class="btn modal-btn modal-btn-danger" id="game-running-close">
                    Close all copies &amp; update
                </button>
                <button type="button" class="btn modal-btn" id="game-running-abort">
                    Abort
                </button>
            </div>
        </div>
    </div>

    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-3.6.1.min.js"></script>
    <!-- Wails<->CEF bridge: must load before neocron.js/launcher.js -->
    <script src="js/bridge.js"></script>
    <script src="js/neocron.js"></script>
    <script src="js/launcher.js"></script>
</body>

</html>
